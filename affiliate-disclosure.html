<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>広告について - ニコ生アニメアンケート資料室</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.8;max-width:860px;margin:32px auto;padding:0 16px;color:#202124;background:#f7f4ed}main{background:#fffdf8;border:1px solid #d8d0c2;border-radius:10px;padding:20px}h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif}a{color:#24545a}</style></head><body><main><h1>広告について</h1><p>当サイトは、運営費の一部をまかなうため、広告・アフィリエイトリンクを掲載する場合があります。広告を掲載する場合は、広告であることが分かるように表示します。</p><h2>楽天アフィリエイトについて</h2><p>当サイトでは、楽天アフィリエイトを利用する場合があります。広告リンクから商品ページへ移動し、購入などが行われた場合、当サイトが紹介料を受け取ることがあります。</p><h2>リンクについて</h2><p>広告リンクには、原則として <code>rel="sponsored nofollow noopener noreferrer"</code> を付けます。</p><p><a href="index.html">トップへ戻る</a></p></main></body></html>
